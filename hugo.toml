baseURL = 'https://sable-20.github.io'
languageCode = 'en-us'
title = 'Sable Ayala'
defaultcontentlanguage = 'en'
noClasses = true

[caches]
[caches.images]
dir = ":cacheDir/images"

[module]
[[module.imports]]
path = 'github.com/luizdepra/hugo-coder'

theme = 'hugo-coder'

[markup]
[markup.goldmark]
[markup.goldmark.renderer]
unsafe = true
[markup.goldmark.extensions]
[markup.goldmark.extensions.passthrough]
enable = true
[markup.goldmark.extensions.passthrough.delimiters]
block = [['\[', '\]'], ['$$', '$$']]
inline = [['\(', '\)']]

[pagination]
pagerSize = 20

[markup.highlight]
style = 'catppuccin-frappe'

[params]
author = "Sable Ayala"
info = "Student | Pharmacy Technician"
description = "My personal website and my resume"
keywords = "blog,resume,pharmacy,student"
avatarurl = 'https://avatars.githubusercontent.com/u/72171476?v=4'

since = '2025'

enableTwemoji = true
colorScheme = "auto"
hidecolorschemetoggle = false

[taxonomies]
category = "categories"
series = "series"
tag = "tags"
author = "authors"

[[params.social]]
name = "Github"
icon = "fa-brands fa-github fa-2x"
weight = 1
url = "https://github.com/Sable-20"

[[params.social]]
name = "LinkedIn"
icon = "fa-brands fa-linkedin fa-2x"
weight = 2
url = "https://www.linkedin.com/in/sable-ayala/"

