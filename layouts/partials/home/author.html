<script src="https://unpkg.com/typeit@8.7.1/dist/index.umd.js"></script>
<h1>{{ .Site.Params.author }}</h1>
<h2 id="info"></h2>
{{ if eq .Site.Language.Lang "en" }}
  <script>
    new TypeIt("#info", {
      waitUntilVisible: true,
    })
      .type("Student | Pharmacy Technician")
      .go();
  </script>
{{ else if eq .Site.Language.Lang "de" }}
  <script>
    new TypeIt("#info", {
      waitUntilVisible: true,
    })
      .type("Studentin | Pharmazeutisch-techniker")
      .go();
  </script>
{{ else if eq .Site.Language.Lang "es" }}
  <script>
    new TypeIt("#info", {
      waitUntilVisible: true,
    })
      .type("estudiante | técnica de farmacia")
      .go();
  </script>
{{ end }}
