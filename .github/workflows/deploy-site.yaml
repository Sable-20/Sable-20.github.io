name: Deploy To Github Pages

on:
  push:
    branches:
    - source

jobs:
  deploy:
    runs-on: ubuntu-20.04
    steps:
    # checkout to the commit that was pushed
    - uses: actions/checkout@v2
    with:
      submodules: true
      fetch-depth: 0

    # install hugo
    - name: Setup Hugo
      uses: peaceiris/actions-hugo@v2
      with:
        hugo-version: '0.85.0'
        extended: true

    # build the stufs
    - name: Build
      run: hugo --minify

    # push
    - name: Deploy
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: main
        publish_dir: ./public